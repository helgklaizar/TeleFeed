name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    # Backend
    - name: Use Node.js ${{ matrix.node-version }} for backend
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'Dev/core/package-lock.json'
    - name: Install dependencies (core)
      run: npm ci
      working-directory: ./Dev/core
    - name: Run backend tests
      run: npm run test
      working-directory: ./Dev/core

    # Frontend
    - name: Use Node.js ${{ matrix.node-version }} for ui
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'Dev/front/tauri/package-lock.json'
    - name: Install dependencies (ui)
      run: npm ci
      working-directory: ./Dev/front/tauri
    - name: Run frontend tests
      run: npm run test
      working-directory: ./Dev/front/tauri
